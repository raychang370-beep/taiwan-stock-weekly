<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股技術分析週報</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1.4rem;
  color: #fff;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(255,255,255,.18);
  border-top-color: rgba(255,255,255,.9);
  border-radius: 50%;
  animation: spin .85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.title { font-size: 1.15rem; font-weight: 600; opacity: .9; }
.sub   { font-size: .82rem; opacity: .45; margin-top: -.6rem; }
.err   {
  background: rgba(204,0,0,.15);
  border: 1px solid rgba(204,0,0,.4);
  border-radius: 12px;
  padding: 1.5rem 2rem;
  text-align: center;
  max-width: 380px;
  line-height: 1.8;
}
.err h3 { margin-bottom: .5rem; }
.err small { opacity: .6; font-size: .8rem; }
.retry {
  margin-top: 1rem;
  padding: .45rem 1.3rem;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-size: .88rem;
  font-family: inherit;
  transition: background .2s;
}
.retry:hover { background: rgba(255,255,255,.22); }
</style>
</head>
<body>
  <div class="spinner" id="spin"></div>
  <p class="title">📊 台股技術分析週報</p>
  <p class="sub"  id="sub">從 Firebase 讀取最新報告中...</p>

  <!-- Firebase JS SDK (compat 版，不需要 bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
  // ── Firebase 初始化 ──────────────────────────────
  firebase.initializeApp({
    apiKey:            "AIzaSyD0eK1ko6UGjy_i3FaMyqUw1UtvDNmv5KM",
    authDomain:        "ai-firebase-92a4e.firebaseapp.com",
    projectId:         "ai-firebase-92a4e",
    storageBucket:     "ai-firebase-92a4e.firebasestorage.app",
    messagingSenderId: "7502985833",
    appId:             "1:7502985833:web:87e857e335d8aafef8c0f8"
  });

  var db = firebase.firestore();

  // ── 顯示錯誤 ─────────────────────────────────────
  function showErr(msg, detail) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('sub').style.display  = 'none';
    var h = '<div class="err">' +
              '<h3>⚠️ 無法載入週報</h3>' +
              '<p>' + msg + '</p>' +
              (detail ? '<p><small>' + detail + '</small></p>' : '') +
              '<button class="retry" onclick="location.reload()">🔄 重新載入</button>' +
            '</div>';
    document.body.insertAdjacentHTML('beforeend', h);
  }

  // ── 從 Firestore 讀取最新報告 ────────────────────
  db.collection('reports').doc('latest').get()
    .then(function(snap) {
      if (!snap.exists) {
        showErr(
          '報告尚未產生',
          '每週一 08:00（台北時間）自動更新'
        );
        return;
      }

      var html = snap.data().html;
      if (!html || html.length < 100) {
        showErr('報告資料異常，請稍後再試。');
        return;
      }

      // 用報告完整 HTML 取代整頁
      // document.open/write/close 在 async callback 中：
      //   open()  → 清空目前頁面
      //   write() → 寫入完整 HTML（含 <script> 會正常執行）
      //   close() → 觸發解析完成，DOMContentLoaded 正常觸發
      document.open('text/html', 'replace');
      document.write(html);
      document.close();
    })
    .catch(function(err) {
      showErr(
        'Firebase 連線失敗',
        err.code ? (err.code + '：' + err.message) : err.message
      );
    });
  </script>
</body>
</html>
